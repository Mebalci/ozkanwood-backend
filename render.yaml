services:
  - type: web
    name: ozkanwood-backend
    env: python
    buildCommand: |
      echo "Using Python version:"
      python --version
      bash build.sh
    startCommand: uvicorn app.main:app --host=0.0.0.0 --port=10000
    workingDir: .
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
      - key: PYTHONPATH
        value: .
